name: 'Initiation'
description: 'Initiating GitHub Action'

inputs:
  variablesPath:
    description: 'The path to the YAML file that contains the key value pairs for environment variables'
    required: true
runs:
  using: 'composite'
  steps:
    - name: 'Install powerShell-yaml PowerShell Module'
      shell: pwsh
      env:
        AZPOLICYLENS_MODULE_VERSION: ${{ inputs.azPolicyLensModuleVersion }}
      run: |
        if (-not (Get-Module -ListAvailable -Name powershell-yaml)) {
          Write-Output "Installing powershell-yaml module..."
          Install-Module -Name powershell-yaml -Force -Scope CurrentUser
        }
    - name: Import Variables
      id: import-variables
      shell: pwsh # PowerShell Core
      env:
        variablesPath: '${{ inputs.variablesPath }}'
      run: |
        ./scripts/github-set-variables.ps1 -configFilePath ${{ env.variablesPath }}
    - name: List Environment Variables
      shell: pwsh # PowerShell Core
      run: |
        . ./scripts/helper/helper-functions.ps1
        Write-Output "Current Date Time: $([DateTime]::UtcNow.ToString('u')) UTC"
        Write-Output "Pipeline Type: $(getPipelineType)"
        Write-Output "Environment Variables:"
        Write-Output "----------------------------------------"
        Get-ChildItem Env:
        Write-Output "----------------------------------------"
        Write-Output "Git Local Configuration:"
        Write-Output "----------------------------------------"
        git config --list
        Write-Output "----------------------------------------"
        Write-Output '::endgroup::'

outputs:
  azPolicyLensModuleVersion:
    description: 'AzPolicyLens.Discovery module version'
    value: ${{ steps.import-variables.outputs.AzPolicyLensModuleVersion }}
